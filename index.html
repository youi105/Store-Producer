<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store Producer</title>

<style>
body{font-family:Arial;margin:0;background:#f4f8fb;}
header{background:#007bff;color:white;padding:15px;text-align:center;}
nav{display:flex;justify-content:space-between;padding:10px;background:#28a745;color:white;}
button{padding:8px;border:none;border-radius:5px;cursor:pointer;}
.product{border:1px solid #ccc;margin:10px;padding:10px;width:180px;display:inline-block;background:#fff;}
.cart{position:fixed;right:10px;top:80px;background:#fff;padding:10px;border:1px solid #ccc;}
</style>
</head>

<body>

<header>
<h1>🛒 Store Producer</h1>
</header>

<nav>
<div id="userArea">Not logged in</div>
<button onclick="login()">Login</button>
</nav>

<h2 style="text-align:center;">Products</h2>

<div id="products"></div>

<div class="cart">
<h3>Cart</h3>
<div id="cartItems"></div>
<p>Total: $<span id="total">0</span></p>
<button onclick="checkout()">Buy</button>
</div>

<hr>

<h2 style="text-align:center;">AI Image Generator</h2>
<input id="prompt" placeholder="Enter product idea">
<button onclick="generateAI()">Generate</button>
<div id="aiImages"></div>

<script>

// PRODUCTS
let products = [
 {name:"Shoes",price:50,img:"https://via.placeholder.com/150"},
 {name:"Watch",price:80,img:"https://via.placeholder.com/150"}
];

// DISPLAY PRODUCTS
const container=document.getElementById("products");
products.forEach((p,i)=>{
 container.innerHTML+=`
 <div class="product">
  <img src="${p.img}">
  <h3>${p.name}</h3>
  <p>$${p.price}</p>
  <button onclick="addToCart(${i})">Add to Cart</button>
 </div>`;
});

// LOGIN SYSTEM
function login(){
 let name=prompt("Enter your name:");
 if(name){
  localStorage.setItem("user",name);
  document.getElementById("userArea").innerText="Welcome "+name;
 }
}

// LOAD USER
if(localStorage.getItem("user")){
 document.getElementById("userArea").innerText="Welcome "+localStorage.getItem("user");
}

// CART
let cart=[];
function addToCart(i){
 cart.push(products[i]);
 updateCart();
}

function updateCart(){
 let items="";
 let total=0;
 cart.forEach(p=>{
  items+=p.name+" - $"+p.price+"<br>";
  total+=p.price;
 });
 document.getElementById("cartItems").innerHTML=items;
 document.getElementById("total").innerText=total;
}

// CHECKOUT
function checkout(){
 let name=prompt("Enter your name:");
 let email=prompt("Enter email:");
 if(name && email){
  alert("Order placed successfully!");
  cart=[];
  updateCart();
 }
}

// AI GENERATOR
function generateAI(){
 let prompt=document.getElementById("prompt").value;
 let div=document.getElementById("aiImages");
 div.innerHTML="";
 for(let i=0;i<3;i++){
  div.innerHTML+=`<img src="https://via.placeholder.com/150?text=${prompt}">`;
 }
}

</script>

</body>
</html>
