<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store Producer</title>

<style>
body{margin:0;font-family:Arial;background:#f4f8fb;}

nav{
 display:flex;
 justify-content:space-between;
 padding:15px;
 background:#007bff;
 color:white;
}

.hero{
 text-align:center;
 padding:60px;
 background:linear-gradient(to right,#007bff,#28a745);
 color:white;
}

.container{
 padding:20px;
 max-width:900px;
 margin:auto;
}

input, button{
 width:100%;
 padding:10px;
 margin:5px 0;
 border-radius:5px;
 border:1px solid #ccc;
}

button{
 background:#28a745;
 color:white;
 border:none;
 cursor:pointer;
}

footer{
 background:#222;
 color:white;
 text-align:center;
 padding:20px;
}
</style>
</head>

<body>

<nav>
<div><b>Store Producer</b></div>
<button onclick="googleLogin()">Login with Google</button>
</nav>

<div class="hero">
<h1>Create Your E-Commerce Website</h1>
<p>Build and save your store online</p>
</div>

<div class="container">

<h2>Create Your Store</h2>

<input id="storeName" placeholder="Store Name">
<input id="productName" placeholder="Product Name">
<input id="productPrice" placeholder="Price">
<input id="productImage" placeholder="Image URL">

<button onclick="saveStore()">Save Store Online</button>

</div>

<footer>
<p>© 2026 Store Producer</p>
</footer>

<!-- 🔥 FIREBASE FULL SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBhJ4h0zmwKvt5F26ynzfJAE2KfiNWx5W4",
  authDomain: "store-producer.firebaseapp.com",
  projectId: "store-producer",
  storageBucket: "store-producer.firebasestorage.app",
  messagingSenderId: "881624121464",
  appId: "1:881624121464:web:1e85dda454efe9812b2d8d",
  measurementId: "G-8Q0TKBM2NQ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

/* GOOGLE LOGIN */
window.googleLogin = function(){
  signInWithPopup(auth, provider)
  .then((result)=>{
    alert("Welcome " + result.user.displayName);
  })
  .catch((error)=>{
    alert(error.message);
  });
}

/* SAVE STORE */
window.saveStore = async function(){

 let name = document.getElementById("storeName").value;

 if(name===""){
   alert("Enter store name");
   return;
 }

 try{
   await addDoc(collection(db, "stores"), {
     storeName: name,
     created: Date.now()
   });

   alert("Store Saved Online ✅🔥");

 }catch(e){
   alert("Error: " + e);
 }
}
</script>

</body>
</html>
